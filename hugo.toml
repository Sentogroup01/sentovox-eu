baseURL = "https://sentovox.eu/"
title = "SentoVox"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[params]
  red = "#ef9a9a"
  formspree_contact = "xaqpbyqy"
  formspree_groups = "myknpyke"
  description = "European visitor research for performing arts venues. Trusted by 130+ theatres, concert halls and cultural centres, supported by 7 universities. Benchmark with peer institutions across Europe."
  keywords = "performing arts visitor research, theatre audience study, cultural venue benchmark, visitor satisfaction, NPS theatre, Impact Compass Model, theatre survey, Europe, bezoekersonderzoek podiumkunsten, publieksonderzoek theater, SentoVox, Sento Group, audience research"
  tagline = "Connect with your visitors through SentoVox visitor research"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en"
    [languages.en.params]
      flag = ""
      cta = "Participate"
  [languages.nl]
    languageName = "Nederlands"
    weight = 2
    contentDir = "content/nl"
    [languages.nl.params]
      flag = "🇳🇱"
      cta = "Deelnemen"
  [languages.fr]
    languageName = "Français"
    weight = 3
    contentDir = "content/fr"
    [languages.fr.params]
      flag = "🇫🇷"
      cta = "Participer"
  [languages.de]
    languageName = "Deutsch"
    weight = 4
    contentDir = "content/de"
    [languages.de.params]
      flag = "🇩🇪"
      cta = "Teilnehmen"
  [languages.it]
    languageName = "Italiano"
    weight = 5
    contentDir = "content/it"
    [languages.it.params]
      flag = "🇮🇹"
      cta = "Partecipare"
  [languages.es]
    languageName = "Español"
    weight = 6
    contentDir = "content/es"
    [languages.es.params]
      flag = "🇪🇸"
      cta = "Participar"


