{{/* Google Analytics 4 — SentoVox property
     Replace G-XXXXXXXXXX with your GA4 measurement ID before going live.
     Loaded on every page via baseof.html. */}}
{{- $gaId := "G-XXXXXXXXXX" -}}
{{- if ne $gaId "G-XXXXXXXXXX" -}}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ $gaId }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ $gaId }}', {
    'anonymize_ip': true
  });
</script>
{{- end -}}
