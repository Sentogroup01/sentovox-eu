{{ define "main" }}
<div class="pageBody">
  <div class="pageInner">
    <div class="card">
      {{ if .Params.kicker }}<p class="kicker">{{ .Params.kicker }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Params.intro }}<p class="lead">{{ . }}</p>{{ end }}
      <div class="page-content">
        {{ .Content }}
      </div>
    </div>
  </div>
</div>
{{ end }}
