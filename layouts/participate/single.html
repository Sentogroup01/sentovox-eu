{{/* Simple content-driven layout — body is in the markdown content file */}}
{{ define "main" }}
<section class="sec is-off" style="padding-top:64px;padding-bottom:24px">
  <div class="wrap" style="max-width:780px">
    <h1 style="font-family:var(--fontD);font-size:34px;font-weight:700;color:var(--teal);margin:0 0 6px;line-height:1.15">{{ .Title }}</h1>
    {{ with .Description }}<p style="color:var(--inkSoft);font-size:16.5px;margin:0 0 28px">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="sec is-white" style="padding-top:0;padding-bottom:80px">
  <div class="wrap article-prose" style="max-width:780px">
    {{ .Content }}
  </div>
</section>
<style>
  .article-prose h2{font-family:var(--fontD);font-size:24px;color:var(--teal);margin:36px 0 12px;line-height:1.25}
  .article-prose h3{font-size:18px;font-weight:700;margin:24px 0 8px;color:var(--ink)}
  .article-prose p{margin:0 0 14px;color:var(--ink);font-size:16px;line-height:1.7}
  .article-prose ul, .article-prose ol{margin:8px 0 18px;padding-left:22px}
  .article-prose li{margin:0 0 6px;line-height:1.6}
  .article-prose strong{font-weight:700}
  .article-prose a{color:var(--teal);text-decoration:underline;text-underline-offset:2px}
  .article-prose a:hover{text-decoration:none;color:var(--tealDark)}
  .article-prose blockquote{border-left:3px solid var(--tealBorder);padding:6px 14px;margin:18px 0;color:var(--inkMuted);background:var(--tealPale);border-radius:6px}
</style>
{{ end }}
